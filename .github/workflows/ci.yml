name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file size
        run: |
          SIZE=$(wc -c < index.html)
          MAX=500000  # 500KB
          echo "index.html: $SIZE bytes"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "⚠️  index.html exceeds 500KB — consider splitting"
          fi

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: true
        continue-on-error: true

      - name: Check HTML structure
        run: |
          echo "=== Panel count ==="
          grep -c 'id="panel-' index.html || true
          echo "=== Script functions ==="
          grep -c 'function ' index.html || true
          echo "=== CSS variables ==="
          grep -c '\-\-' index.html || true

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: node tests/unit.test.js

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check RLS DELETE ownership
        run: |
          grep -F 'USING ((select username from profiles where id = auth.uid()) = author);' supabase/migration.sql
          grep -F 'USING ((select username from profiles where id = auth.uid()) = poster);' supabase/migration.sql
          grep -F 'USING ((select username from profiles where id = auth.uid()) = username);' supabase/migration.sql

      - name: Check dynamic onclick encoding guards
        run: |
          grep -F 'decodeURIComponent' js/app.js
          grep -F 'encodeURIComponent' js/app.js
          grep -F 'escapeHtml' js/app.js

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome for Playwright
        run: npx playwright install chrome

      - name: Run smoke tests
        run: npx playwright test

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
